# Passive-relevant nmap probes for PRADS
#
# These probes elicit responses that are also seen in natural (passive)
# network traffic. Probes not listed here require specific active payloads
# that would not normally appear in passive captures.
#
# Usage: nmap2prads.py --passive-probes passive-probes.conf ...
#
# TCP probes — responses commonly seen in passive monitoring
NULL
GetRequest
GenericLines
SSLSessionReq
TLSSessionReq
SSLv23SessionReq
SMBProgNeg
RTSPRequest
# TCP probes — responses sometimes seen depending on environment
HTTPOptions
FourOhFourRequest
Help
SIPOptions
TerminalServer
TerminalServerCookie
oracle-tns
ms-sql-s
LDAPBindReq
LDAPSearchReq
NotesRPC
mongodb
redis-server
Memcache
mqtt
# UDP probes — responses commonly seen in passive monitoring
DNSStatusRequest
DNSVersionBindReq
SNMPv1public
